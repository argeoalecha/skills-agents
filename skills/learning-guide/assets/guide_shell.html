<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&display=swap">
<style>
:root{
  --ink:#11201c;
  --ink-soft:#3a4d47;
  --paper:#f6f4ee;
  --paper-2:#fffdf8;
  --line:#d9d4c7;
  --line-soft:#e7e2d6;
  --teal:#0d7a6e;
  --teal-deep:#075249;
  --teal-wash:#e3efea;
  --coral:#e0613a;
  --coral-wash:#fbe9e0;
  --amber:#caa23a;
  --amber-wash:#f6eccc;
  --code-bg:#0f1f1b;
  --code-ink:#d7e6df;
  --shadow:0 1px 2px rgba(17,32,28,.06),0 8px 24px rgba(17,32,28,.05);
  --mono:"SFMono-Regular",ui-monospace,"JetBrains Mono","Cascadia Code",Menlo,Consolas,monospace;
  --serif:"Iowan Old Style","Palatino Linotype",Palatino,"Book Antiqua",Georgia,serif;
  --sans:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0;background:var(--paper);color:var(--ink);
  font-family:var(--sans);font-size:16px;line-height:1.65;
  -webkit-font-smoothing:antialiased;
}

/* ── Layout ─────────────────────────────────────────────── */
.shell{display:grid;grid-template-columns:300px minmax(0,1fr);min-height:100vh}
.sidebar{
  position:sticky;top:0;height:100vh;overflow-y:auto;
  background:var(--paper-2);border-right:1px solid var(--line);
  padding:0;
}
.main{min-width:0;padding:0 0 8rem}
.content{max-width:860px;margin:0 auto;padding:3.5rem 3rem 0}

/* ── Sidebar brand ──────────────────────────────────────── */
.brand{
  padding:1.6rem 1.4rem 1.3rem;border-bottom:1px solid var(--line);
  position:sticky;top:0;background:var(--paper-2);z-index:5;
}
.brand-kicker{
  font-family:var(--mono);font-size:.66rem;letter-spacing:.22em;
  text-transform:uppercase;color:var(--teal);font-weight:600;
}
.brand-title{
  font-family:var(--serif);font-size:1.32rem;line-height:1.15;
  margin:.45rem 0 .2rem;font-weight:600;letter-spacing:-.01em;
}
.brand-sub{font-size:.74rem;color:var(--ink-soft);font-family:var(--mono);letter-spacing:.02em}

/* ── Hayah-AI logo strip ────────────────────────────────── */
.hayah-logo-wrap{
  padding:1.1rem 1.4rem .9rem;
  background:#0a3d3a;
  border-bottom:1px solid #07302e;
  display:flex;
  justify-content:center;
}
.hayah-logo-wrap svg{display:block;width:100%;height:auto;max-width:220px}

/* ── Sidebar progress meter ─────────────────────────────── */
.progress-wrap{padding:.9rem 1.4rem;border-bottom:1px solid var(--line-soft)}
.progress-label{
  display:flex;justify-content:space-between;align-items:baseline;
  font-family:var(--mono);font-size:.66rem;letter-spacing:.1em;
  text-transform:uppercase;color:var(--ink-soft);margin-bottom:.4rem;
}
.progress-label b{color:var(--teal-deep);font-size:.78rem}
.progress-bar{height:6px;background:var(--line-soft);border-radius:99px;overflow:hidden}
.progress-fill{height:100%;width:0;background:linear-gradient(90deg,var(--teal),var(--teal-deep));
  border-radius:99px;transition:width .4s cubic-bezier(.4,0,.2,1)}
.progress-reset{
  margin-top:.55rem;font-family:var(--mono);font-size:.62rem;letter-spacing:.06em;
  color:var(--ink-soft);background:none;border:none;cursor:pointer;padding:0;
  text-transform:uppercase;text-decoration:underline;text-underline-offset:2px;
}
.progress-reset:hover{color:var(--coral)}

/* ── Sidebar nav ────────────────────────────────────────── */
nav{padding:.7rem .7rem 3rem}
.nav-group{margin-bottom:.1rem}
.nav-top{
  display:block;padding:.4rem .7rem;border-radius:7px;
  color:var(--ink-soft);text-decoration:none;font-size:.85rem;
  line-height:1.3;transition:background .15s,color .15s;
}
.nav-top:hover{background:var(--teal-wash);color:var(--teal-deep)}
.nav-phase{
  font-weight:600;color:var(--ink);font-family:var(--sans);
  letter-spacing:-.005em;margin-top:.3rem;
}
.nav-phase::before{
  content:"";display:inline-block;width:6px;height:6px;border-radius:2px;
  background:var(--teal);margin-right:.55rem;vertical-align:middle;opacity:.8;
}
.nav-children{
  margin:.1rem 0 .35rem .55rem;padding-left:.7rem;
  border-left:1px solid var(--line-soft);
}
.nav-child{
  display:block;padding:.26rem .6rem;border-radius:6px;
  color:var(--ink-soft);text-decoration:none;font-size:.78rem;line-height:1.3;
  transition:background .15s,color .15s;
}
.nav-child:hover{background:var(--teal-wash);color:var(--teal-deep)}
.nav-child.active,.nav-top.active{
  background:var(--teal-wash);color:var(--teal-deep);font-weight:600;
}

/* ── Mobile nav toggle ──────────────────────────────────── */
.menu-btn{
  display:none;position:fixed;top:1rem;left:1rem;z-index:50;
  background:var(--teal-deep);color:#fff;border:none;border-radius:8px;
  width:44px;height:44px;font-size:1.3rem;cursor:pointer;box-shadow:var(--shadow);
}

/* ── Typography ─────────────────────────────────────────── */
.content h1{
  font-family:var(--serif);font-size:2.5rem;line-height:1.08;font-weight:600;
  letter-spacing:-.02em;margin:.2rem 0 .3rem;
}
.content h1+h2{border:none;margin-top:0;padding-top:0;color:var(--teal-deep);
  font-size:1.15rem;font-weight:600;font-family:var(--sans)}
.content h1+h2+h3{color:var(--ink-soft);font-family:var(--mono);font-size:.8rem;
  letter-spacing:.04em;font-weight:500;margin-top:.2rem;text-transform:none;border:none;padding:0}
.content h2{
  font-family:var(--serif);font-size:1.85rem;font-weight:600;letter-spacing:-.015em;
  margin:3.2rem 0 1rem;padding-top:1.4rem;border-top:1px solid var(--line);
  scroll-margin-top:1.5rem;
}
.content h3{
  font-size:1.28rem;font-weight:650;margin:2.4rem 0 .6rem;letter-spacing:-.01em;
  scroll-margin-top:1.5rem;color:var(--ink);
}
.content h3[id^="module"]{
  color:var(--teal-deep);
  padding-left:.85rem;border-left:3px solid var(--teal);
}
.content h4{
  font-family:var(--mono);font-size:.92rem;font-weight:600;letter-spacing:.01em;
  margin:1.8rem 0 .5rem;color:var(--ink-soft);scroll-margin-top:1.5rem;
}
.content p{margin:.7rem 0}
.content a{color:var(--teal-deep);text-decoration:underline;text-underline-offset:2px;
  text-decoration-thickness:1px;text-decoration-color:var(--line)}
.content a:hover{text-decoration-color:var(--teal)}
.content strong{font-weight:650;color:var(--ink)}
.content em{font-style:italic}
.content hr{border:none;border-top:1px solid var(--line-soft);margin:2.4rem 0}
.content ul,.content ol{margin:.7rem 0;padding-left:1.3rem}
.content li{margin:.3rem 0}
.content li::marker{color:var(--teal)}

/* ── Hero subject mark ──────────────────────────────────── */
.hero{display:flex;align-items:center;justify-content:space-between;gap:2rem}
.hero-text{min-width:0}
.hero-mark{flex-shrink:0;display:flex;align-items:center;justify-content:center}
.hero-mark svg{width:84px;height:84px;display:block}
@media(max-width:1000px){
  .hero{gap:1rem}
  .hero-mark svg{width:48px;height:48px}
}

/* ── Blockquote: module metadata ────────────────────────── */
blockquote.module-meta{
  margin:.9rem 0 1.6rem;padding:.9rem 1.1rem;
  background:var(--teal-wash);border:1px solid #cbe3db;
  border-left:3px solid var(--teal);border-radius:0 9px 9px 0;
  font-size:.86rem;line-height:1.55;
}
blockquote.module-meta p{margin:.2rem 0}
blockquote.module-meta strong{color:var(--teal-deep)}

/* ── Blockquote: general callout ────────────────────────── */
blockquote.callout{
  margin:1.3rem 0;padding:.9rem 1.1rem;
  background:var(--amber-wash);border:1px solid #ecdcb0;
  border-left:3px solid var(--amber);border-radius:0 9px 9px 0;
  font-size:.9rem;
}
blockquote.callout p{margin:.25rem 0}
blockquote.callout strong{color:#8a6d1d}
.content blockquote:not(.module-meta):not(.callout){
  margin:1.3rem 0;padding:.7rem 1.1rem;border-left:3px solid var(--line);
  color:var(--ink-soft);background:var(--paper-2);border-radius:0 8px 8px 0;
}

/* ── Code ───────────────────────────────────────────────── */
code{
  font-family:var(--mono);font-size:.82em;
  background:var(--teal-wash);color:var(--teal-deep);
  padding:.12em .42em;border-radius:5px;border:1px solid #d3e7e0;
}
pre{
  background:var(--code-bg);border:1px solid #1d342e;border-radius:11px;
  padding:1.05rem 1.2rem;overflow-x:auto;margin:1.1rem 0;
  box-shadow:var(--shadow);position:relative;
}
pre code{
  background:none;border:none;color:var(--code-ink);padding:0;font-size:.82rem;
  line-height:1.6;
}
pre::before{
  content:attr(data-lang);position:absolute;top:.5rem;right:.8rem;
  font-family:var(--mono);font-size:.6rem;letter-spacing:.12em;
  text-transform:uppercase;color:#5a7d73;
}

/* ── Artifact card: scripts / frameworks / templates / worksheets ──────
   Lighter, on-brand alternative to the dark code terminal — for
   non-code artifacts (business / non-technical guides). Author with:
   <pre class="artifact" data-kind="SCRIPT"><code>...</code></pre>            */
pre.artifact{
  background:var(--paper-2);border:1px solid var(--line);
  border-left:3px solid var(--teal);border-radius:0 11px 11px 0;
}
pre.artifact code{color:var(--ink)}
pre.artifact::before{content:attr(data-kind);color:var(--teal-deep)}

/* ── Tables ─────────────────────────────────────────────── */
.table-scroll{overflow-x:auto;margin:1.2rem 0;border-radius:10px;border:1px solid var(--line);
  box-shadow:var(--shadow)}
table{border-collapse:collapse;width:100%;font-size:.84rem;background:var(--paper-2)}
th{
  background:var(--teal-deep);color:#eef6f3;font-weight:600;text-align:left;
  padding:.6rem .8rem;font-size:.74rem;letter-spacing:.04em;text-transform:uppercase;
  white-space:nowrap;
}
td{padding:.55rem .8rem;border-top:1px solid var(--line-soft);vertical-align:top}
tr:nth-child(even) td{background:#faf8f2}
td code{font-size:.78em;white-space:nowrap}

/* ── Interactive module index ───────────────────────────── */
.module-index-table tr[data-href]{cursor:pointer}
.module-index-table tr[data-href]:hover td{background:var(--teal-wash);color:var(--teal-deep)}
.module-index-table td:first-child{
  font-family:var(--mono);font-weight:700;color:var(--teal-deep);font-size:.82rem;
}
.module-index-table tr[data-href] td:first-child{
  text-decoration:underline;text-underline-offset:2px;text-decoration-color:var(--line);
}
.module-index-table tr[data-href]:hover td:first-child{text-decoration-color:var(--teal)}

/* ── Checklist enhancement ──────────────────────────────── */
.content ul li input[type=checkbox]{
  margin-right:.5rem;accent-color:var(--teal);width:15px;height:15px;
  vertical-align:-2px;cursor:pointer;
}

/* ── Footer ─────────────────────────────────────────────── */
.content em:last-child{color:var(--ink-soft)}

/* ── Back to top ────────────────────────────────────────── */
.totop{
  position:fixed;bottom:1.4rem;right:1.4rem;z-index:40;
  background:var(--teal-deep);color:#fff;border:none;border-radius:10px;
  width:46px;height:46px;font-size:1.1rem;cursor:pointer;box-shadow:var(--shadow);
  opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;
}
.totop.show{opacity:1;pointer-events:auto}
.totop:hover{transform:translateY(-3px)}

/* ── Responsive ─────────────────────────────────────────── */
@media (max-width:1000px){
  .shell{grid-template-columns:1fr}
  .menu-btn{display:block}
  .sidebar{
    position:fixed;left:0;top:0;width:300px;z-index:45;
    transform:translateX(-100%);transition:transform .28s cubic-bezier(.4,0,.2,1);
    box-shadow:0 0 40px rgba(17,32,28,.25);
  }
  .sidebar.open{transform:translateX(0)}
  .content{padding:4.5rem 1.4rem 0}
  .content h1{font-size:2rem}
  .content h2{font-size:1.5rem}
  .scrim{position:fixed;inset:0;background:rgba(17,32,28,.4);z-index:44;
    opacity:0;pointer-events:none;transition:opacity .25s}
  .scrim.show{opacity:1;pointer-events:auto}
}
@media (min-width:1001px){.scrim{display:none}}

@media (prefers-reduced-motion:reduce){
  *{transition:none!important;scroll-behavior:auto!important}
}

/* ── Glossary definition list ────────────────────────────── */
dl.glossary{margin:.5rem 0 1.6rem;padding:0}
dl.glossary dt{
  font-weight:650;color:var(--teal-deep);margin:1.2rem 0 .2rem;
  font-size:.93rem;padding-left:.75rem;border-left:2px solid var(--teal);
  scroll-margin-top:1.5rem;
}
dl.glossary dd{
  margin:0 0 .2rem 1.75rem;line-height:1.65;font-size:.88rem;color:var(--ink);
}
dl.glossary .avoid{
  font-size:.78rem;font-family:var(--mono);color:var(--ink-soft);
  letter-spacing:.01em;margin-top:.05rem;
}
dl.glossary .avoid strong{color:var(--coral);font-weight:600}
</style>
</head>
<body>
<button class="menu-btn" id="menuBtn" aria-label="Toggle navigation">☰</button>
<div class="scrim" id="scrim"></div>

<div class="shell">
  <aside class="sidebar" id="sidebar">
    <div class="hayah-logo-wrap">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 344 96" role="img" aria-label="hayah-ai — learn from home">
        <path d="M 12 52 A 28 28 0 0 1 52 12" fill="none" stroke="#faf7f5" stroke-width="8" stroke-linecap="round"/>
        <circle cx="52" cy="12" r="6" fill="#ff6b47"/>
        <text x="68" y="48" font-family="DM Serif Display, Georgia, serif" font-size="44" font-weight="400" fill="#faf7f5" letter-spacing="-1.2">hayah<tspan fill="#e8f4f1">-</tspan><tspan fill="#ff6b47" font-style="italic">ai</tspan></text>
        <text x="0" y="84" font-family="Inter, Helvetica Neue, sans-serif" font-size="15" font-weight="300" fill="#e8f4f1" textLength="230" lengthAdjust="spacing">learn from home</text>
      </svg>
    </div>
    <div class="brand">
      <div class="brand-kicker">{{BRAND_KICKER}}</div>
      <div class="brand-title">{{BRAND_TITLE}}</div>
      <div class="brand-sub">{{BRAND_SUB}}</div>
    </div>
    <div class="progress-wrap">
      <div class="progress-label"><span>Module progress</span><b id="progPct">0%</b></div>
      <div class="progress-bar"><div class="progress-fill" id="progFill"></div></div>
      <button class="progress-reset" id="progReset">Reset progress</button>
    </div>
    <nav id="nav">
{{NAV_TREE}}
    </nav>
  </aside>

  <main class="main">
    <article class="content" id="content">
{{MAIN_CONTENT}}
    </article>
  </main>
</div>

<button class="totop" id="toTop" aria-label="Back to top">↑</button>

<script>
(function(){
  "use strict";

  // ── Tag code blocks with language label ──────────────────
  document.querySelectorAll("pre > code").forEach(function(code){
    var cls = code.className || "";
    var m = cls.match(/language-(\w+)/);
    var lang = m ? m[1] : "";
    var map = {py:"python",js:"javascript",sql:"sql",dax:"dax",m:"M / Power Query",
               excel:"excel",bash:"shell",md:"markdown",markdown:"markdown",
               python:"python",javascript:"javascript",r:"R",typescript:"typescript",
               ts:"typescript",css:"css",html:"html",json:"json",yaml:"yaml",
               /* EXTEND_LANG_MAP */};
    if(lang){ code.parentElement.setAttribute("data-lang", map[lang]||lang); }
  });

  // ── Wrap tables for horizontal scroll ────────────────────
  document.querySelectorAll(".content table").forEach(function(t){
    if(t.parentElement.classList.contains("table-scroll")) return;
    var w=document.createElement("div");w.className="table-scroll";
    t.parentElement.insertBefore(w,t);w.appendChild(t);
  });

  // ── Convert markdown task-list "[ ]" text into checkboxes ─
  document.querySelectorAll(".content li").forEach(function(li){
    var first = li.childNodes[0];
    if(first && first.nodeType===3){
      var t=first.nodeValue;
      var mm=t.match(/^\s*\[( |x|X)\]\s?/);
      if(mm){
        var checked = mm[1].toLowerCase()==="x";
        first.nodeValue = t.replace(/^\s*\[( |x|X)\]\s?/,"");
        var cb=document.createElement("input");
        cb.type="checkbox"; cb.checked=checked; cb.className="task-cb";
        li.insertBefore(cb, li.firstChild);
      }
    }
  });

  // ── Progress tracking (in-memory, session only) ──────────
  // The sidebar meter reflects ONLY the Progress Tracker checklist (real module
  // completion), not the Placement Quiz self-assessment. Placement-quiz boxes
  // stay interactive but are excluded from the count.
  var STORE = {}; // in-memory only (artifacts cannot use localStorage)
  var allCb = Array.prototype.slice.call(document.querySelectorAll(".task-cb"));
  var ptHeading = document.getElementById("progress-tracker");
  var countedCb = ptHeading
    ? allCb.filter(function(c){
        return !!(ptHeading.compareDocumentPosition(c) & Node.DOCUMENT_POSITION_FOLLOWING);
      })
    : allCb; // fallback: if no tracker section, count everything

  function updateProgress(){
    var total = countedCb.length;
    var done = countedCb.filter(function(c){return c.checked}).length;
    var pct = total? Math.round(done/total*100):0;
    document.getElementById("progFill").style.width = pct+"%";
    document.getElementById("progPct").textContent = pct+"%";
  }
  allCb.forEach(function(c){
    c.addEventListener("change",function(){ updateProgress(); });
  });
  updateProgress();

  document.getElementById("progReset").addEventListener("click",function(){
    countedCb.forEach(function(c){c.checked=false});
    updateProgress();
  });

  // ── Scrollspy: highlight active nav item ─────────────────
  var navLinks = Array.prototype.slice.call(document.querySelectorAll("#nav a"));
  var linkById = {};
  navLinks.forEach(function(a){
    var id=a.getAttribute("href").slice(1); linkById[id]=a;
  });
  var targets = navLinks.map(function(a){
    return document.getElementById(a.getAttribute("href").slice(1));
  }).filter(Boolean);

  var spy = new IntersectionObserver(function(entries){
    entries.forEach(function(e){
      if(e.isIntersecting){
        navLinks.forEach(function(a){a.classList.remove("active")});
        var id=e.target.id;
        if(linkById[id]) linkById[id].classList.add("active");
      }
    });
  },{rootMargin:"-10% 0px -80% 0px",threshold:0});
  targets.forEach(function(t){spy.observe(t)});

  // ── Mobile nav ───────────────────────────────────────────
  var sb=document.getElementById("sidebar"),
      scrim=document.getElementById("scrim"),
      mb=document.getElementById("menuBtn");
  function closeNav(){sb.classList.remove("open");scrim.classList.remove("show")}
  mb.addEventListener("click",function(){
    sb.classList.toggle("open");scrim.classList.toggle("show");
  });
  scrim.addEventListener("click",closeNav);
  document.querySelectorAll("#nav a").forEach(function(a){
    a.addEventListener("click",function(){ if(window.innerWidth<=1000) closeNav(); });
  });

  // ── Interactive module index (click a row to jump) ───────
  document.querySelectorAll(".module-index-table tr[data-href]").forEach(function(row){
    row.addEventListener("click",function(){
      var id=this.getAttribute("data-href").slice(1);
      var target=document.getElementById(id);
      if(target){target.scrollIntoView({behavior:"smooth",block:"start"});}
    });
  });

  // ── Back to top ──────────────────────────────────────────
  var tt=document.getElementById("toTop");
  window.addEventListener("scroll",function(){
    if(window.scrollY>600) tt.classList.add("show"); else tt.classList.remove("show");
  },{passive:true});
  tt.addEventListener("click",function(){window.scrollTo({top:0,behavior:"smooth"})});
})();
</script>
</body>
</html>
