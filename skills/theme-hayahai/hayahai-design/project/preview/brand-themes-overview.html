<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 24px; font-family: 'Plus Jakarta Sans', sans-serif; background: #faf7f5; }
  .row { display:flex; gap: 12px; }
  .pal { flex:1; height: 220px; border-radius: 14px; padding: 16px; display:flex; flex-direction:column; justify-content:space-between; }
  .pal .name { font-family: 'DM Serif Display', serif; font-size: 22px; line-height:1; }
  .pal .desc { font-size: 11px; opacity: 0.85; line-height:1.4; }
  .swatch-row { display:flex; gap: 4px; }
  .sw { flex:1; height: 18px; border-radius: 4px; }
</style></head>
<body>
  <div class="row" style="margin-bottom: 12px;">
    <div class="pal" style="background:#faf7f5; border: 1px solid #A1E4DB;">
      <div>
        <div class="name" style="color:#0a3d3a;">Classic</div>
        <div class="desc" style="color:#1C5753; margin-top: 4px;">DM Serif Display + Plus Jakarta Sans. Editorial SaaS confidence.</div>
      </div>
      <div class="swatch-row">
        <div class="sw" style="background:#0a3d3a;"></div>
        <div class="sw" style="background:#1E6E66;"></div>
        <div class="sw" style="background:#A1E4DB;"></div>
        <div class="sw" style="background:#ff6b47;"></div>
        <div class="sw" style="background:#faf7f5; border:1px solid rgba(0,0,0,0.05);"></div>
      </div>
    </div>
    <div class="pal" style="background: linear-gradient(160deg, #fff5f2 0%, #faf7f5 50%, #F3FFF9 100%); border: 1px solid #ffb5a0;">
      <div>
        <div class="name" style="color:#0a3d3a; font-family: 'Fraunces', serif; font-weight:700;">Coral</div>
        <div class="desc" style="color:#7d4a38; margin-top: 4px;">Fraunces + Outfit. Warm consumer voice.</div>
      </div>
      <div class="swatch-row">
        <div class="sw" style="background:#ff6b47;"></div>
        <div class="sw" style="background:#ffb5a0;"></div>
        <div class="sw" style="background:#0a3d3a;"></div>
        <div class="sw" style="background:#A1E4DB;"></div>
        <div class="sw" style="background:#fff5f2; border:1px solid rgba(0,0,0,0.05);"></div>
      </div>
    </div>
  </div>
  <div class="row" style="margin-bottom: 12px;">
    <div class="pal" style="background:#fff; border: 1px solid #0F3836; border-top: 3px solid #0F3836; border-radius: 0;">
      <div>
        <div class="name" style="color:#0F3836; font-family: 'Space Grotesk', sans-serif; font-weight:700; letter-spacing:-0.02em;">Editorial</div>
        <div class="desc" style="color:#1C5753; margin-top: 4px;">Clash Display + Satoshi. Type-led, sharp corners.</div>
      </div>
      <div class="swatch-row">
        <div class="sw" style="background:#0F3836;"></div>
        <div class="sw" style="background:#ff6b47;"></div>
        <div class="sw" style="background:#25A497;"></div>
        <div class="sw" style="background:#e8f4f1;"></div>
        <div class="sw" style="background:#ffffff; border:1px solid rgba(0,0,0,0.08);"></div>
      </div>
    </div>
    <div class="pal" style="background:#faf7f5; border: 1px solid rgba(161,228,219,0.4); position:relative; overflow:hidden;">
      <div style="position:absolute; inset:0; background: radial-gradient(at 0% 0%, rgba(37,164,151,0.25) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(255,107,71,0.15) 0px, transparent 50%); z-index: 0;"></div>
      <div style="position:relative; z-index:1;">
        <div class="name" style="color:#0a3d3a; font-family: 'Space Grotesk', sans-serif; font-weight:700; letter-spacing:-0.02em;">Bento</div>
        <div class="desc" style="color:#1C5753; margin-top: 4px;">Space Grotesk + Geist. AI-product grid energy.</div>
      </div>
      <div class="swatch-row" style="position:relative; z-index:1;">
        <div class="sw" style="background:#25A497;"></div>
        <div class="sw" style="background:#A1E4DB;"></div>
        <div class="sw" style="background:#0a3d3a;"></div>
        <div class="sw" style="background:#ff6b47;"></div>
        <div class="sw" style="background:#fff; border:1px solid rgba(0,0,0,0.05);"></div>
      </div>
    </div>
  </div>
  <div class="row">
    <div class="pal" style="background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(37,164,151,0.25) 0%, transparent 70%), #0F3836; border: 1px solid rgba(161,228,219,0.15);">
      <div>
        <div class="name" style="color:#faf7f5; font-family: 'Syne', sans-serif; font-weight:800; letter-spacing:-0.02em;">Midnight</div>
        <div class="desc" style="color:#A1E4DB; margin-top: 4px;">Syne + Geist. Dark surfaces, glass, glow.</div>
      </div>
      <div class="swatch-row">
        <div class="sw" style="background:#0F3836; border:1px solid rgba(161,228,219,0.2);"></div>
        <div class="sw" style="background:#1C5753;"></div>
        <div class="sw" style="background:#25A497;"></div>
        <div class="sw" style="background:#ff6b47;"></div>
        <div class="sw" style="background:#A1E4DB;"></div>
      </div>
    </div>
  </div>
</body></html>
