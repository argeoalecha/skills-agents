<!doctype html>
<html lang="en" data-theme="classic">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Hayah-AI · Landing kit</title>
<link rel="stylesheet" href="../../colors_and_type.css"/>
<template id="__bundler_thumbnail" data-bg-color="#faf7f5">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect width="1200" height="800" fill="#faf7f5"/>
    <g transform="translate(600 400)">
      <path d="M -160 130 A 220 220 0 0 1 160 -130" fill="none" stroke="#0a3d3a" stroke-width="48" stroke-linecap="round"/>
      <circle cx="160" cy="-130" r="48" fill="#ff6b47"/>
    </g>
    <text x="600" y="640" font-family="Georgia, serif" font-size="72" fill="#0a3d3a" text-anchor="middle" letter-spacing="-2">Hayah-AI</text>
  </svg>
</template>
<style>
  body { margin: 0; }
  .btn-primary {
    font-family: var(--font-body); font-weight: 600; font-size: 15px;
    padding: 14px 28px; border-radius: var(--r-md); border: none; cursor: pointer;
    background: var(--coral-500); color: #fff;
    box-shadow: var(--shadow-coral);
    transition: background 150ms;
  }
  .btn-primary:hover { background: var(--coral-600); }
  [data-theme="bento"] .btn-primary,
  [data-theme="midnight"] .btn-primary { background: var(--coral-500); }
  [data-theme="editorial"] .btn-primary { background: var(--teal-950); border-radius: 0; box-shadow: none; border: 2px solid var(--teal-950); }
  [data-theme="editorial"] .btn-primary:hover { background: var(--coral-500); border-color: var(--coral-500); }

  .btn-secondary {
    font-family: var(--font-body); font-weight: 600; font-size: 15px;
    padding: 12px 26px; border-radius: var(--r-md); cursor: pointer;
    background: transparent; color: var(--fg-1); border: 2px solid var(--fg-1);
    transition: all 150ms;
  }
  .btn-secondary:hover { background: var(--fg-1); color: var(--cream); }
  [data-theme="editorial"] .btn-secondary { border-radius: 0; }
  [data-theme="midnight"] .btn-secondary { background: rgba(37,164,151,0.12); color: #A1E4DB; border: 1px solid rgba(161,228,219,0.3); }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="Nav.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="Features.jsx"></script>
<script type="text/babel" src="Sections.jsx"></script>
<script type="text/babel">
  function App() {
    const [theme, setTheme] = React.useState("classic");
    React.useEffect(() => {
      document.documentElement.setAttribute("data-theme", theme);
    }, [theme]);
    return (
      <div data-screen-label="Landing">
        <LandingNav theme={theme} setTheme={setTheme}/>
        <Hero theme={theme}/>
        <Features theme={theme}/>
        <Metrics theme={theme}/>
        <CTA theme={theme}/>
        <Footer theme={theme}/>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
