<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="grid" style="grid-template-columns: 1fr 1fr; gap: 10px; font-size: 13px;">
  <div style="display:flex; align-items:center; gap:10px; padding: 10px 14px; background: #fff; border-radius: 10px; border: 1px solid rgba(10,61,58,0.06);">
    <span style="display:inline-block; width:16px; height:16px; background:#0a3d3a; border-radius: 4px;"></span>
    <div><div style="font-weight:600; color:#0a3d3a;">fg-1</div><div class="mono muted">#0a3d3a</div></div>
  </div>
  <div style="display:flex; align-items:center; gap:10px; padding: 10px 14px; background: #fff; border-radius: 10px; border: 1px solid rgba(10,61,58,0.06);">
    <span style="display:inline-block; width:16px; height:16px; background:#1C5753; border-radius: 4px;"></span>
    <div><div style="font-weight:600; color:#0a3d3a;">fg-2</div><div class="mono muted">#1C5753</div></div>
  </div>
  <div style="display:flex; align-items:center; gap:10px; padding: 10px 14px; background: #fff; border-radius: 10px; border: 1px solid rgba(10,61,58,0.06);">
    <span style="display:inline-block; width:16px; height:16px; background:#7a9b96; border-radius: 4px;"></span>
    <div><div style="font-weight:600; color:#0a3d3a;">fg-3</div><div class="mono muted">#7a9b96</div></div>
  </div>
  <div style="display:flex; align-items:center; gap:10px; padding: 10px 14px; background: #0a3d3a; border-radius: 10px;">
    <span style="display:inline-block; width:16px; height:16px; background:#faf7f5; border-radius: 4px;"></span>
    <div><div style="font-weight:600; color:#faf7f5;">fg-on-dark</div><div class="mono" style="color:#A1E4DB;">#faf7f5</div></div>
  </div>
  <div style="display:flex; align-items:center; gap:10px; padding: 10px 14px; background: #faf7f5; border-radius: 10px; border: 1px solid rgba(10,61,58,0.06);">
    <span style="display:inline-block; width:16px; height:16px; background:#faf7f5; border-radius: 4px; border: 1px solid rgba(10,61,58,0.1);"></span>
    <div><div style="font-weight:600; color:#0a3d3a;">bg-page</div><div class="mono muted">#faf7f5</div></div>
  </div>
  <div style="display:flex; align-items:center; gap:10px; padding: 10px 14px; background: #fff; border-radius: 10px; border: 1px solid rgba(10,61,58,0.06);">
    <span style="display:inline-block; width:16px; height:16px; background:#fff; border-radius: 4px; border: 1px solid rgba(10,61,58,0.1);"></span>
    <div><div style="font-weight:600; color:#0a3d3a;">bg-card</div><div class="mono muted">#ffffff</div></div>
  </div>
  <div style="display:flex; align-items:center; gap:10px; padding: 10px 14px; background: #25A497; border-radius: 10px;">
    <span style="display:inline-block; width:16px; height:16px; background:#fff; border-radius: 4px;"></span>
    <div><div style="font-weight:600; color:#fff;">link / focus</div><div class="mono" style="color:rgba(255,255,255,0.85);">#25A497</div></div>
  </div>
  <div style="display:flex; align-items:center; gap:10px; padding: 10px 14px; background: #ff6b47; border-radius: 10px;">
    <span style="display:inline-block; width:16px; height:16px; background:#fff; border-radius: 4px;"></span>
    <div><div style="font-weight:600; color:#fff;">accent / cta</div><div class="mono" style="color:rgba(255,255,255,0.9);">#ff6b47</div></div>
  </div>
</div>
</body></html>
