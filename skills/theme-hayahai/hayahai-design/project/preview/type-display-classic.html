<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 28px 24px; }
  .row { display:flex; align-items:baseline; gap: 16px; padding: 6px 0; border-bottom: 1px solid rgba(10,61,58,0.06); }
  .row:last-child { border: none; }
  .label { width: 56px; flex-shrink:0; color: #7a9b96; font-size: 10px; letter-spacing:0.08em; text-transform:uppercase; font-weight:600; }
  .meta  { margin-left:auto; font-family: var(--font-mono); font-size:11px; color:#7a9b96; flex-shrink:0; }
</style></head>
<body>
<div class="row" style="font-family: 'DM Serif Display', serif;">
  <span class="label">Hero</span>
  <span style="font-size: 56px; line-height:1; color:#0a3d3a; letter-spacing:-0.03em;">Built for teams</span>
  <span class="meta">DM Serif · 72/1.1</span>
</div>
<div class="row" style="font-family: 'DM Serif Display', serif;">
  <span class="label">H1</span>
  <span style="font-size: 36px; line-height:1.2; color:#0a3d3a; letter-spacing:-0.02em;">A single source</span>
  <span class="meta">DM Serif · 40/1.2</span>
</div>
<div class="row" style="font-family: 'DM Serif Display', serif;">
  <span class="label">H2</span>
  <span style="font-size: 26px; line-height:1.3; color:#0a3d3a; letter-spacing:-0.015em;">Connect any source</span>
  <span class="meta">DM Serif · 28/1.3</span>
</div>
<div class="row" style="font-family: 'Plus Jakarta Sans', sans-serif;">
  <span class="label">H3</span>
  <span style="font-size: 19px; line-height:1.4; color:#0a3d3a; font-weight:600;">Sub-section heading</span>
  <span class="meta">Jakarta · 20/1.4 · 600</span>
</div>
<div class="row" style="font-family: 'Plus Jakarta Sans', sans-serif;">
  <span class="label">H4</span>
  <span style="font-size: 16px; line-height:1.5; color:#0a3d3a; font-weight:600;">Smaller heading</span>
  <span class="meta">Jakarta · 16/1.5 · 600</span>
</div>
</body></html>
