<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 24px; font-family: 'Plus Jakarta Sans', sans-serif; }
  .row { display:flex; gap: 14px; align-items:center; flex-wrap:wrap; }
  .tile { width: 90px; height: 70px; background:#fff; border: 1px solid rgba(161,228,219,0.4); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; }
  .tile .v { font-size:13px; font-weight:600; color:#0a3d3a; font-family: 'JetBrains Mono', monospace; }
  .tile .n { font-size:10px; color:#7a9b96; letter-spacing:0.06em; text-transform:uppercase; font-weight:600; }
</style></head>
<body>
  <div class="row">
    <div class="tile" style="border-radius: 6px;"><span class="v">6</span><span class="n">r-xs</span></div>
    <div class="tile" style="border-radius: 10px;"><span class="v">10</span><span class="n">r-sm</span></div>
    <div class="tile" style="border-radius: 16px;"><span class="v">16</span><span class="n">r-md</span></div>
    <div class="tile" style="border-radius: 20px;"><span class="v">20</span><span class="n">r-lg</span></div>
    <div class="tile" style="border-radius: 28px;"><span class="v">28</span><span class="n">r-xl</span></div>
    <div class="tile" style="border-radius: 9999px;"><span class="v">∞</span><span class="n">r-full</span></div>
    <div class="tile" style="border-radius: 0;"><span class="v">0</span><span class="n">editorial</span></div>
  </div>
</body></html>
