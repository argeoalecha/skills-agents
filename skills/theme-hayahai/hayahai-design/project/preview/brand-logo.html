<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Geist:wght@300;400;500&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  body { padding: 28px 24px; background: #faf7f5; }
  .lockup { display:flex; align-items:center; padding: 20px 24px; border-radius: 14px; background: #fff; border: 1px solid rgba(161,228,219,0.4); margin-bottom: 10px; }
  .lockup:last-child { margin: 0; }
  .label { font-size: 10px; letter-spacing:0.08em; text-transform:uppercase; font-weight:600; color:#7a9b96; margin-left: auto; font-family: 'Plus Jakarta Sans', sans-serif; white-space: nowrap; padding-left: 20px; }
</style></head>
<body>

  <!-- Light bg — full logo with tagline -->
  <div class="lockup">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 344 96" width="258" height="72" role="img" aria-label="Hayah-AI — business automation">
      <path d="M 12 52 A 28 28 0 0 1 52 12" fill="none" stroke="#0a3d3a" stroke-width="8" stroke-linecap="round"/>
      <circle cx="52" cy="12" r="6" fill="#ff6b47"/>
      <text x="68" y="48" font-family="DM Serif Display, Georgia, serif" font-size="44" font-weight="400" fill="#0a3d3a" letter-spacing="-1.2">hayah<tspan fill="#7a9b96">-</tspan><tspan fill="#ff6b47" font-style="italic">ai</tspan></text>
      <text x="0" y="84" font-family="Geist, Helvetica Neue, sans-serif" font-size="15" font-weight="300" fill="#0a3d3a" textLength="230" lengthAdjust="spacing">business automation</text>
    </svg>
    <span class="label">Full logo · Light</span>
  </div>

  <!-- Dark bg — full logo with tagline -->
  <div class="lockup" style="background: #0F3836; border-color: rgba(161,228,219,0.15);">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 344 96" width="258" height="72" role="img" aria-label="Hayah-AI — business automation">
      <path d="M 12 52 A 28 28 0 0 1 52 12" fill="none" stroke="#faf7f5" stroke-width="8" stroke-linecap="round"/>
      <circle cx="52" cy="12" r="6" fill="#ff6b47"/>
      <text x="68" y="48" font-family="DM Serif Display, Georgia, serif" font-size="44" font-weight="400" fill="#faf7f5" letter-spacing="-1.2">hayah<tspan fill="#A1E4DB">-</tspan><tspan fill="#ff6b47" font-style="italic">ai</tspan></text>
      <text x="0" y="84" font-family="Geist, Helvetica Neue, sans-serif" font-size="15" font-weight="300" fill="#faf7f5" textLength="230" lengthAdjust="spacing">business automation</text>
    </svg>
    <span class="label" style="color:#A1E4DB;">Full logo · Dark</span>
  </div>

  <!-- Mark only -->
  <div class="lockup">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="48" height="48" role="img" aria-label="Hayah-AI mark">
      <path d="M 12 52 A 28 28 0 0 1 52 12" fill="none" stroke="#0a3d3a" stroke-width="8" stroke-linecap="round"/>
      <circle cx="52" cy="12" r="6" fill="#ff6b47"/>
    </svg>
    <span class="label">Mark only · 48px</span>
  </div>

</body></html>
