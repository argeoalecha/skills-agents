<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 24px; }
  .row { display:flex; gap: 12px; align-items:center; flex-wrap: wrap; margin-bottom: 14px; }
  .row:last-child { margin: 0; }
  .label { font-size: 10px; letter-spacing:0.08em; text-transform:uppercase; font-weight:600; color:#7a9b96; width: 100%; margin-bottom: 4px; }
  .btn { font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 600; font-size: 15px; padding: 14px 28px; border-radius: 12px; border: none; cursor: pointer; }
</style></head>
<body>
  <div class="row"><span class="label">Primary — Coral CTA</span>
    <button class="btn" style="background:#ff6b47; color:#fff; box-shadow: 0 4px 14px rgba(255,107,71,0.35);">Get started</button>
    <button class="btn" style="background:#e55a38; color:#fff; box-shadow: 0 4px 14px rgba(255,107,71,0.45);">Hover</button>
    <button class="btn" style="background:#ffb5a0; color:#fff;" disabled>Disabled</button>
  </div>
  <div class="row"><span class="label">Primary — Teal CTA (Bento/Midnight)</span>
    <button class="btn" style="background:#25A497; color:#fff; box-shadow: 0 4px 16px rgba(37,164,151,0.35);">Continue</button>
    <button class="btn" style="background:#1E6E66; color:#fff; box-shadow: 0 4px 16px rgba(37,164,151,0.45);">Hover</button>
  </div>
  <div class="row"><span class="label">Secondary</span>
    <button class="btn" style="background:transparent; color:#0a3d3a; border: 2px solid #0a3d3a; padding: 12px 26px;">Learn more</button>
    <button class="btn" style="background:#0a3d3a; color:#faf7f5; border: 2px solid #0a3d3a; padding: 12px 26px;">Hover</button>
    <button class="btn" style="background:rgba(37,164,151,0.1); color:#0a3d3a; border: 1px solid rgba(37,164,151,0.4);">Soft</button>
  </div>
  <div class="row"><span class="label">Ghost · Editorial (sharp)</span>
    <button class="btn" style="background:transparent; color:#1E6E66; padding: 12px 20px;">Read docs →</button>
    <button class="btn" style="background:#0F3836; color:#fff; border-radius: 0; border: 2px solid #0F3836;">Editorial primary</button>
    <button class="btn" style="background:transparent; color:#0F3836; border-radius: 0; border: 2px solid #0F3836; padding: 14px 30px;">Editorial secondary</button>
  </div>
</body></html>
