<!doctype html>
<html lang="en" data-theme="classic">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Hayah · App kit</title>
<link rel="stylesheet" href="../../colors_and_type.css"/>
<style>
  body { margin: 0; }
  .btn-primary {
    font-family: var(--font-body); font-weight: 600; font-size: 14px;
    padding: 10px 18px; border-radius: 10px; border: none; cursor: pointer;
    background: var(--coral-500); color: #fff;
    box-shadow: var(--shadow-coral);
    transition: background 150ms;
  }
  .btn-primary:hover { background: var(--coral-600); }
  .btn-secondary {
    font-family: var(--font-body); font-weight: 600; font-size: 14px;
    padding: 9px 16px; border-radius: 10px; cursor: pointer;
    background: transparent; color: var(--fg-1); border: 1.5px solid var(--border-2);
  }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="Icon.jsx"></script>
<script type="text/babel" src="Shell.jsx"></script>
<script type="text/babel" src="Screens.jsx"></script>
<script type="text/babel">
  function App() {
    const [active, setActive] = React.useState("home");
    const [theme] = React.useState("classic");
    React.useEffect(() => document.documentElement.setAttribute("data-theme", theme), [theme]);
    const screen = active === "home" ? <HomeScreen onOpenProject={() => setActive("chat")}/>
                 : active === "chat" ? <ChatScreen/>
                 : active === "settings" ? <SettingsScreen/>
                 : <HomeScreen onOpenProject={() => setActive("chat")}/>;
    return (
      <AppShell active={active} onNav={setActive} theme={theme}>
        {screen}
      </AppShell>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
