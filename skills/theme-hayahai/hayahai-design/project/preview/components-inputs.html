<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 24px; font-family: 'Plus Jakarta Sans', sans-serif; }
  .field { margin-bottom: 14px; }
  .field:last-child { margin: 0; }
  label { display: block; font-size: 12px; font-weight:600; color:#0a3d3a; margin-bottom: 6px; letter-spacing: 0.02em; }
  input, textarea, select { width: 100%; font-family: inherit; font-size: 15px; color:#0a3d3a; background:#fff; border: 1.5px solid #A1E4DB; border-radius: 10px; padding: 12px 14px; outline: none; }
  input:focus { border-color: #25A497; box-shadow: 0 0 0 4px rgba(37,164,151,0.12); }
  .focused { border-color: #25A497 !important; box-shadow: 0 0 0 4px rgba(37,164,151,0.12); }
  .help { font-size: 12px; color:#7a9b96; margin-top: 6px; }
  .err { color:#e55a38; }
</style></head>
<body>
  <div class="field">
    <label>Workspace name</label>
    <input value="Hayah Studio" />
  </div>
  <div class="field">
    <label>Email</label>
    <input class="focused" placeholder="you@hayah.design" />
    <div class="help">We'll send a verification link.</div>
  </div>
  <div class="field">
    <label>Plan</label>
    <select><option>Pro · $24 / mo</option><option>Team</option><option>Enterprise</option></select>
  </div>
  <div class="field">
    <label>API key</label>
    <input value="hyh_4f8c…2a91" style="font-family: 'JetBrains Mono', monospace; font-size: 13px;" readonly />
    <div class="help err">⚠ Rotate every 90 days.</div>
  </div>
</body></html>
