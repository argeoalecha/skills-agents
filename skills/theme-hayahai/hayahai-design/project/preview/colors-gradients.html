<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="col" style="gap: 10px;">
  <div class="row">
    <div style="flex:1; aspect-ratio: 4/1; border-radius: 10px; background: radial-gradient(ellipse at top left, #25A497 0%, #0a3d3a 70%); display:flex; align-items:flex-end; padding: 10px;">
      <span style="color:#faf7f5; font-size:11px; font-weight:600;">Teal radial</span>
    </div>
    <div style="flex:1; aspect-ratio: 4/1; border-radius: 10px; background: linear-gradient(135deg, #1E6E66 0%, #0a3d3a 100%); display:flex; align-items:flex-end; padding: 10px;">
      <span style="color:#faf7f5; font-size:11px; font-weight:600;">Teal linear</span>
    </div>
  </div>
  <div class="row">
    <div style="flex:1; aspect-ratio: 4/1; border-radius: 10px; background: linear-gradient(135deg, #25A497 0%, #A1E4DB 100%); display:flex; align-items:flex-end; padding: 10px;">
      <span style="color:#0a3d3a; font-size:11px; font-weight:600;">Aqua mint</span>
    </div>
    <div style="flex:1; aspect-ratio: 4/1; border-radius: 10px; background: linear-gradient(135deg, #ff8f73 0%, #ff6b47 100%); display:flex; align-items:flex-end; padding: 10px;">
      <span style="color:#fff; font-size:11px; font-weight:600;">Coral warm</span>
    </div>
  </div>
  <div class="row">
    <div style="flex:1; aspect-ratio: 4/1; border-radius: 10px; background: linear-gradient(160deg, #fff5f2 0%, #faf7f5 50%, #F3FFF9 100%); display:flex; align-items:flex-end; padding: 10px; border: 1px solid rgba(10,61,58,0.05);">
      <span style="color:#0a3d3a; font-size:11px; font-weight:600;">Soft warm</span>
    </div>
    <div style="flex:1; aspect-ratio: 4/1; border-radius: 10px; background: radial-gradient(at 0% 0%, rgba(37,164,151,0.5) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(255,107,71,0.3) 0px, transparent 50%), #faf7f5; display:flex; align-items:flex-end; padding: 10px;">
      <span style="color:#0a3d3a; font-size:11px; font-weight:600;">Mesh</span>
    </div>
  </div>
</div>
</body></html>
