<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account · Hayah Midnight</title>
  <meta name="description" content="Create your Hayah account — powerful dark-mode AI workspace." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Syne:wght@600;700;800&family=Geist:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --teal-950: #0F3836;
      --teal-900:    #0a3d3a;
      --teal-800:  #1a4d47;
      --teal-700:  #1C5753;
      --teal-600:   #1E6E66;
      --teal-500:         #25A497;
      --teal-400:   #A1E4DB;
      --muted:         #7a9b96;
      --coral-500:        #ff6b47;
      --coral-400:   #ff8f73;
      --cream:     #faf7f5;
    }

    html, body { min-height: 100%; }

    body {
      font-family: 'Geist', sans-serif;
      background: var(--teal-950);
      color: var(--cream);
      position: relative;
      overflow-x: hidden;
    }

    /* ── AMBIENT GLOWS ────────────────────────────────── */
    .bg-glow-1 {
      position: fixed;
      top: -200px;
      left: -100px;
      width: 700px;
      height: 700px;
      background: radial-gradient(ellipse, rgba(37,164,151,0.18) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
    }

    .bg-glow-2 {
      position: fixed;
      bottom: -200px;
      right: -100px;
      width: 600px;
      height: 600px;
      background: radial-gradient(ellipse, rgba(255,107,71,0.10) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
    }

    .bg-grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(37,164,151,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(37,164,151,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── NAV ──────────────────────────────────────────── */
    .top-nav {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 48px;
      height: 88px;
      border-bottom: 1px solid rgba(161,228,219,0.1);
      background: rgba(15,56,54,0.7);
      backdrop-filter: blur(20px);
    }

    .logo {
      display: flex;
      align-items: center;
    }

    .nav-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 500;
      color: var(--teal-400);
    }

    .status-dot {
      width: 6px;
      height: 6px;
      background: var(--teal-500);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(37,164,151,0.4); }
      50%       { opacity: 0.6; box-shadow: 0 0 0 4px rgba(37,164,151,0); }
    }

    /* ── PAGE WRAPPER ──────────────────────────────────── */
    .page-wrapper {
      position: relative;
      z-index: 1;
      min-height: calc(100svh - 88px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 56px 24px;
    }

    /* ── AUTH CARD ────────────────────────────────────── */
    .auth-card {
      width: 100%;
      max-width: 480px;
      background: rgba(28,87,83,0.25);
      border: 1px solid rgba(161,228,219,0.15);
      border-radius: 24px;
      padding: 48px;
      backdrop-filter: blur(24px);
      box-shadow: 0 24px 64px rgba(0,0,0,0.3), 0 0 0 1px rgba(37,164,151,0.08);
    }

    /* ── BADGE ────────────────────────────────────────── */
    .auth-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(37,164,151,0.12);
      border: 1px solid rgba(161,228,219,0.25);
      color: var(--teal-500);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 6px 14px;
      border-radius: 20px;
      margin-bottom: 24px;
    }

    .badge-live {
      width: 6px;
      height: 6px;
      background: var(--teal-500);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    /* ── HEADINGS ─────────────────────────────────────── */
    .auth-title {
      font-family: 'Syne', sans-serif;
      font-size: 38px;
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1.05;
      color: #fff;
      margin-bottom: 10px;
    }

    .auth-title .highlight { color: var(--coral-500); }

    .auth-subtitle {
      font-size: 15px;
      color: var(--teal-400);
      line-height: 1.6;
      margin-bottom: 36px;
    }

    .auth-subtitle a {
      color: var(--teal-500);
      font-weight: 600;
      text-decoration: none;
    }

    .auth-subtitle a:hover { text-decoration: underline; }

    /* ── OAUTH ────────────────────────────────────────── */
    .oauth-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 28px;
    }

    .btn-oauth {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      height: 46px;
      border-radius: 12px;
      border: 1px solid rgba(161,228,219,0.2);
      background: rgba(37,164,151,0.08);
      color: var(--teal-400);
      font-family: 'Geist', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.18s ease;
    }

    .btn-oauth:hover {
      background: rgba(37,164,151,0.16);
      border-color: rgba(161,228,219,0.4);
      color: #fff;
      transform: translateY(-1px);
    }

    /* ── DIVIDER ──────────────────────────────────────── */
    .divider {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 28px;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: rgba(161,228,219,0.12);
    }

    .divider-text {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    /* ── FORM ─────────────────────────────────────────── */
    .form-stack {
      display: flex;
      flex-direction: column;
      gap: 18px;
      margin-bottom: 24px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--teal-400);
      letter-spacing: 0.02em;
    }

    .field-input {
      height: 48px;
      padding: 0 16px;
      border-radius: 12px;
      border: 1px solid rgba(161,228,219,0.18);
      background: rgba(15,56,54,0.5);
      font-family: 'Geist', sans-serif;
      font-size: 14px;
      color: #fff;
      outline: none;
      transition: border-color 0.18s, box-shadow 0.18s;
    }

    .field-input::placeholder { color: var(--muted); opacity: 0.6; }

    .field-input:focus {
      border-color: var(--teal-500);
      box-shadow: 0 0 0 3px rgba(37,164,151,0.15);
    }

    .password-wrapper { position: relative; }

    .password-wrapper .field-input { width: 100%; padding-right: 48px; }

    .toggle-pw {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 20px;
      height: 20px;
      transition: color 0.15s;
    }

    .toggle-pw:hover { color: var(--teal-400); }

    /* Password strength */
    .pw-strength {
      display: flex;
      gap: 4px;
      margin-top: 8px;
    }

    .pw-bar {
      flex: 1;
      height: 3px;
      border-radius: 2px;
      background: rgba(161,228,219,0.15);
      transition: background 0.3s;
    }

    .pw-bar.weak   { background: var(--coral-500); }
    .pw-bar.medium { background: #f0a500; }
    .pw-bar.strong { background: var(--teal-500); }

    .pw-hint {
      font-size: 11px;
      color: var(--muted);
      margin-top: 5px;
      font-family: 'JetBrains Mono', monospace;
    }

    /* Terms */
    .terms-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 24px;
    }

    .checkbox {
      width: 16px;
      height: 16px;
      border-radius: 4px;
      accent-color: var(--teal-500);
      cursor: pointer;
      margin-top: 2px;
      flex-shrink: 0;
    }

    .terms-label {
      font-size: 13px;
      color: var(--teal-400);
      line-height: 1.5;
    }

    .terms-label a { color: var(--teal-500); text-decoration: none; font-weight: 500; }
    .terms-label a:hover { text-decoration: underline; }

    /* ── SUBMIT ───────────────────────────────────────── */
    .btn-primary {
      width: 100%;
      height: 52px;
      background: linear-gradient(135deg, var(--coral-500) 0%, #e85730 100%);
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.01em;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(255,107,71,0.4);
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-primary:hover {
      box-shadow: 0 8px 28px rgba(255,107,71,0.5);
      transform: translateY(-2px);
    }

    .btn-primary:disabled { cursor: default; transform: none; }

    .btn-arrow {
      display: flex;
      align-items: center;
      transition: transform 0.18s;
    }

    .btn-primary:hover .btn-arrow { transform: translateX(4px); }

    /* ── FOOTER ───────────────────────────────────────── */
    .auth-footer {
      text-align: center;
      margin-top: 20px;
    }

    .auth-footer p {
      font-size: 13px;
      color: var(--muted);
    }

    .auth-footer a {
      color: var(--teal-500);
      font-weight: 600;
      text-decoration: none;
    }

    .auth-footer a:hover { text-decoration: underline; }

    /* ── METRIC STRIP ─────────────────────────────────── */
    .metric-strip {
      display: flex;
      gap: 1px;
      margin-top: 32px;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid rgba(161,228,219,0.12);
    }

    .metric-item {
      flex: 1;
      background: rgba(15,56,54,0.6);
      padding: 14px 12px;
      text-align: center;
    }

    .metric-num {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 800;
      color: var(--teal-500);
      letter-spacing: -0.02em;
    }

    .metric-lbl {
      font-size: 10px;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-top: 2px;
    }
  </style>
</head>
<body>

  <div class="bg-glow-1"></div>
  <div class="bg-glow-2"></div>
  <div class="bg-grid"></div>

  <!-- ── NAV ────────────────────────────────────────── -->
  <nav class="top-nav">
    <div class="logo">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 344 96" width="241" height="67" role="img" aria-label="Hayah-AI — business automation">
        <path d="M 12 52 A 28 28 0 0 1 52 12" fill="none" stroke="#faf7f5" stroke-width="8" stroke-linecap="round"/>
        <circle cx="52" cy="12" r="6" fill="#ff6b47"/>
        <text x="68" y="48" font-family="DM Serif Display, Georgia, serif" font-size="44" font-weight="400" fill="#faf7f5" letter-spacing="-1.2">hayah<tspan fill="#A1E4DB">-</tspan><tspan fill="#ff6b47" font-style="italic">ai</tspan></text>
        <text x="0" y="84" font-family="Geist, Helvetica Neue, sans-serif" font-size="15" font-weight="300" fill="#faf7f5" textLength="230" lengthAdjust="spacing">business automation</text>
      </svg>
    </div>
    <div class="nav-status">
      <span class="status-dot"></span>
      All systems operational
    </div>
  </nav>

  <!-- ── MAIN ───────────────────────────────────────── -->
  <div class="page-wrapper">
    <div class="auth-card">
      <div class="auth-badge">
        <span class="badge-live"></span>
        Join 12,000+ teams
      </div>

      <h1 class="auth-title">
        Start building<br>with <span class="highlight">AI power</span>
      </h1>
      <p class="auth-subtitle">
        Create your free account. Already have one? <a href="#">Sign in here</a>
      </p>

      <!-- OAuth -->
      <div class="oauth-grid">
        <button class="btn-oauth" id="btn-google" type="button">
          <svg width="16" height="16" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Google
        </button>
        <button class="btn-oauth" id="btn-github" type="button">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0 1 12 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/>
          </svg>
          GitHub
        </button>
      </div>

      <!-- Divider -->
      <div class="divider">
        <div class="divider-line"></div>
        <span class="divider-text">or with email</span>
        <div class="divider-line"></div>
      </div>

      <!-- Form -->
      <form id="signup-form" novalidate>
        <div class="form-stack">
          <div class="form-row">
            <div class="field-group">
              <label class="field-label" for="first-name">First name</label>
              <input class="field-input" id="first-name" type="text" placeholder="Ada" autocomplete="given-name" />
            </div>
            <div class="field-group">
              <label class="field-label" for="last-name">Last name</label>
              <input class="field-input" id="last-name" type="text" placeholder="Lovelace" autocomplete="family-name" />
            </div>
          </div>

          <div class="field-group">
            <label class="field-label" for="email">Work email</label>
            <input class="field-input" id="email" type="email" placeholder="ada@company.io" autocomplete="email" />
          </div>

          <div class="field-group">
            <label class="field-label" for="password">Password</label>
            <div class="password-wrapper">
              <input class="field-input" id="password" type="password" placeholder="Create a strong password" autocomplete="new-password" />
              <button class="toggle-pw" type="button" id="toggle-pw" aria-label="Toggle password">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
            <div class="pw-strength" id="pw-strength">
              <div class="pw-bar" id="bar1"></div>
              <div class="pw-bar" id="bar2"></div>
              <div class="pw-bar" id="bar3"></div>
              <div class="pw-bar" id="bar4"></div>
            </div>
            <div class="pw-hint" id="pw-hint"></div>
          </div>
        </div>

        <div class="terms-row">
          <input class="checkbox" id="terms" type="checkbox" />
          <label class="terms-label" for="terms">
            I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
          </label>
        </div>

        <button class="btn-primary" id="btn-create" type="submit">
          Create account
          <span class="btn-arrow">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </span>
        </button>
      </form>

      <div class="auth-footer">
        <p>Already have an account? <a href="#" id="link-signin">Sign in</a></p>
      </div>

      <div class="metric-strip">
        <div class="metric-item">
          <div class="metric-num">12K+</div>
          <div class="metric-lbl">Teams</div>
        </div>
        <div class="metric-item">
          <div class="metric-num">99.9%</div>
          <div class="metric-lbl">Uptime</div>
        </div>
        <div class="metric-item">
          <div class="metric-num">SOC 2</div>
          <div class="metric-lbl">Certified</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const pw = document.getElementById('password');
    const toggle = document.getElementById('toggle-pw');
    const eyeOpen   = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
    const eyeClosed = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;

    toggle.addEventListener('click', () => {
      const show = pw.type === 'password';
      pw.type = show ? 'text' : 'password';
      toggle.innerHTML = show ? eyeClosed : eyeOpen;
    });

    const hints = ['', 'Too short', 'Could be stronger', 'Almost there', 'Strong password'];
    pw.addEventListener('input', () => {
      const val = pw.value;
      const bars = [document.getElementById('bar1'), document.getElementById('bar2'), document.getElementById('bar3'), document.getElementById('bar4')];
      bars.forEach(b => { b.className = 'pw-bar'; });
      let score = 0;
      if (val.length === 0) { document.getElementById('pw-hint').textContent = ''; return; }
      if (val.length >= 6) score++;
      if (val.length >= 10) score++;
      if (/[A-Z]/.test(val) && /[0-9]/.test(val)) score++;
      if (val.length >= 14) score++;
      const cls = score <= 1 ? 'weak' : score === 2 ? 'medium' : 'strong';
      bars.slice(0, score || 1).forEach(b => b.classList.add(cls));
      document.getElementById('pw-hint').textContent = hints[score] || '';
    });

    document.getElementById('signup-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn-create');
      btn.innerHTML = 'Creating account…';
      btn.style.opacity = '0.7';
      btn.disabled = true;
      setTimeout(() => {
        btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg> Welcome to Hayah`;
        btn.style.background = 'linear-gradient(135deg, #25A497, #1E6E66)';
        btn.style.boxShadow = '0 4px 20px rgba(37,164,151,0.4)';
        btn.style.opacity = '1';
        btn.disabled = false;
      }, 1400);
    });
  </script>
</body>
</html>
