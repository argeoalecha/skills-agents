<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="grid" style="grid-template-columns: repeat(4, 1fr);">
  <div style="aspect-ratio: 1; background: #7d2d15; border-radius: 12px; padding: 12px; display:flex; flex-direction:column; justify-content:flex-end;">
    <div style="color:#fff; font-weight:600; font-size:13px;">Coral 700</div>
    <div style="color:rgba(255,255,255,0.8); font-size:11px; font-family: var(--font-mono);">#7d2d15</div>
  </div>
  <div style="aspect-ratio: 1; background: #e55a38; border-radius: 12px; padding: 12px; display:flex; flex-direction:column; justify-content:flex-end;">
    <div style="color:#fff; font-weight:600; font-size:13px;">Coral 600</div>
    <div style="color:rgba(255,255,255,0.85); font-size:11px; font-family: var(--font-mono);">#e55a38</div>
  </div>
  <div style="aspect-ratio: 1; background: #ff6b47; border-radius: 12px; padding: 12px; display:flex; flex-direction:column; justify-content:flex-end;">
    <div style="color:#fff; font-weight:600; font-size:13px;">Coral 500</div>
    <div style="color:rgba(255,255,255,0.9); font-size:11px; font-family: var(--font-mono);">#ff6b47</div>
  </div>
  <div style="aspect-ratio: 1; background: #ff8f73; border-radius: 12px; padding: 12px; display:flex; flex-direction:column; justify-content:flex-end;">
    <div style="color:#fff; font-weight:600; font-size:13px;">Coral 400</div>
    <div style="color:rgba(255,255,255,0.9); font-size:11px; font-family: var(--font-mono);">#ff8f73</div>
  </div>
  <div style="aspect-ratio: 1; background: #ffb5a0; border-radius: 12px; padding: 12px; display:flex; flex-direction:column; justify-content:flex-end;">
    <div style="color:#7d2d15; font-weight:600; font-size:13px;">Coral 300</div>
    <div style="color:#7d2d15; font-size:11px; font-family: var(--font-mono);">#ffb5a0</div>
  </div>
  <div style="aspect-ratio: 1; background: #fff5f2; border-radius: 12px; padding: 12px; display:flex; flex-direction:column; justify-content:flex-end; border: 1px solid rgba(10,61,58,0.06);">
    <div style="color:#7d2d15; font-weight:600; font-size:13px;">Coral 200</div>
    <div style="color:#7d2d15; font-size:11px; font-family: var(--font-mono);">#fff5f2</div>
  </div>
  <div style="aspect-ratio: 1; background: #faf7f5; border-radius: 12px; padding: 12px; display:flex; flex-direction:column; justify-content:flex-end; border: 1px solid rgba(10,61,58,0.06);">
    <div style="color:#0a3d3a; font-weight:600; font-size:13px;">Cream</div>
    <div style="color:#1C5753; font-size:11px; font-family: var(--font-mono);">#faf7f5</div>
  </div>
  <div style="aspect-ratio: 1; background: #7a9b96; border-radius: 12px; padding: 12px; display:flex; flex-direction:column; justify-content:flex-end;">
    <div style="color:#fff; font-weight:600; font-size:13px;">Muted</div>
    <div style="color:rgba(255,255,255,0.85); font-size:11px; font-family: var(--font-mono);">#7a9b96</div>
  </div>
</div>
</body></html>
