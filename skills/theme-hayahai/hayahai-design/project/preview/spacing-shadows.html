<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 28px 24px; font-family: 'Plus Jakarta Sans', sans-serif; background: #faf7f5; }
  .row { display:flex; gap: 18px; align-items:flex-start; flex-wrap:wrap; }
  .tile { width: 130px; height: 90px; background:#fff; border-radius: 14px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; }
  .tile .n { font-size:10px; color:#7a9b96; letter-spacing:0.06em; text-transform:uppercase; font-weight:600; }
  .tile .v { font-family: 'JetBrains Mono', monospace; font-size:10px; color:#0a3d3a; }
</style></head>
<body>
  <div class="row">
    <div class="tile" style="box-shadow: 0 1px 2px rgba(10,61,58,0.05);"><span class="n">xs</span><span class="v">soft</span></div>
    <div class="tile" style="box-shadow: 0 2px 8px rgba(10,61,58,0.06);"><span class="n">sm</span><span class="v">card</span></div>
    <div class="tile" style="box-shadow: 0 4px 16px rgba(10,61,58,0.08);"><span class="n">md</span><span class="v">hover</span></div>
    <div class="tile" style="box-shadow: 0 8px 32px rgba(10,61,58,0.10), 0 2px 8px rgba(10,61,58,0.06);"><span class="n">lg</span><span class="v">popover</span></div>
  </div>
  <div class="row" style="margin-top: 22px;">
    <div class="tile" style="box-shadow: 0 4px 20px rgba(255,107,71,0.4); background:#ff6b47;"><span class="n" style="color:rgba(255,255,255,0.85);">CORAL</span><span class="v" style="color:#fff;">cta</span></div>
    <div class="tile" style="box-shadow: 0 4px 16px rgba(37,164,151,0.35); background:#25A497;"><span class="n" style="color:rgba(255,255,255,0.9);">TEAL</span><span class="v" style="color:#fff;">cta</span></div>
    <div class="tile" style="box-shadow: 0 0 40px rgba(37,164,151,0.4); background:#0F3836;"><span class="n" style="color:#A1E4DB;">GLOW</span><span class="v" style="color:#A1E4DB;">midnight</span></div>
    <div class="tile" style="box-shadow: 0 0 40px rgba(255,107,71,0.4); background:#0F3836;"><span class="n" style="color:#ff8f73;">GLOW</span><span class="v" style="color:#ff8f73;">midnight</span></div>
  </div>
</body></html>
